<header class="topbar">
  <div class="topbar-title">Enterprise Security Operations Center</div>
  <div class="topbar-actions">
    <div class="user-menu">
      <span class="text-sm text-muted">{{ current_user.name if current_user else 'User' }}</span>
      <div class="user-avatar">{{ (current_user.name[0] if current_user else 'U') | upper }}</div>
      <a href="{{ url_for('logout') }}" class="btn btn-secondary btn-sm">Sign Out</a>
    </div>
  </div>
</header>
